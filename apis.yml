aid: ivanti
name: Ivanti
description: >-
  Ivanti is an IT asset management and security platform providing unified
  endpoint management, patch management, and IT service management. The
  Ivanti Neurons product family exposes REST APIs across People & Devices,
  MDM, ITSM, and Zero-Trust Access, alongside Endpoint Manager APIs for
  patch and software distribution.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Endpoint Management
  - IT Asset Management
  - IT Service Management
  - Patch Management
  - Mobile Device Management
  - Zero Trust
url: >-
